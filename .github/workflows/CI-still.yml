name: LibreOffice Still
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.flag }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: en-GB
            flag: "🇬🇧"
          - language: it
            flag: "🇮🇹"
          - language: ar
            flag: "🇸🇦"
          - language: zh-CN
            flag: "🇨🇳"
          - language: zh-TW
            flag: "🇹🇼"
          - language: fr
            flag: "🇫🇷"
          - language: de
            flag: "🇩🇪"
          - language: ja
            flag: "🇯🇵"
          - language: ko
            flag: "🇰🇷"
          - language: pt
            flag: "🇵🇹"
          - language: pt-BR
            flag: "🇧🇷"
          - language: es
            flag: "🇪🇸"
          - language: ru
            flag: "🇷🇺"
          - language: standard
            flag: "🌐"
          - language: full
            flag: "🌐"

    steps:
    - uses: actions/checkout@v6

    - name: build
      if: always()
      run: |
        sudo apt update && sudo apt install desktop-file-utils
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

        URL="https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
        wget -c "$URL" -O appimagetool && chmod a+x ./appimagetool
        export PATH="$PWD":"${PATH}"
        
        chmod a+x ./make_libreoffice_appimage
        
        # Build both N and Y variants
        ./make_libreoffice_appimage still x86-64 "${{ matrix.language }}" N Y Y Y
        ./make_libreoffice_appimage still x86-64 "${{ matrix.language }}" Y Y Y Y
        
        mkdir -p dist
        find . -type d -name out
        mv ./*/*AppImage* dist/

    - name: Upload artifact
      uses: actions/upload-artifact@v4.4.0
      with:
        name: AppImage-${{ matrix.language }}
        path: 'dist'
        
  release:
      needs: [build]
      permissions: write-all
      runs-on: ubuntu-latest

      steps:
        - uses: actions/download-artifact@v4.1.8
          with:
            name: AppImage

        # Snapshot Release
        - name: get date
          run: |
            SNAPSHOT_TAG="$(date --utc +'%Y%m%d-%H%M%S')"
            echo SNAPSHOT_TAG="${SNAPSHOT_TAG}" >> "${GITHUB_ENV}"
          continue-on-error: false
        - name: create snapshot
          uses: softprops/action-gh-release@v2
          with:
            name: "Snapshot STILL ${{ env.SNAPSHOT_TAG}}"
            tag_name: "${{ env.SNAPSHOT_TAG}}"
            prerelease: false
            draft: false
            generate_release_notes: false
            make_latest: false
            files: |
              *.AppImage*
          continue-on-error: false

        # Continuous release
        - name: release
          uses: marvinpinto/action-automatic-releases@latest
          with:
            title: LibreOffice STILL
            automatic_release_tag: continuous-still
            prerelease: false
            draft: false
            files: |
              *.AppImage*
            repo_token: ${{ secrets.GITHUB_TOKEN }}
