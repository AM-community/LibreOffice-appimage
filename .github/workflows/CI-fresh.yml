name: LibreOffice Fresh

on:
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref_name || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  APPIMAGETOOL_NAME: appimagetool-x86_64.AppImage

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup apt cache folder
        run: mkdir -p "$HOME/.cache/apt/archives"

      - name: Cache apt packages
        id: cache
        uses: actions/cache@v5
        with:
          path: $HOME/.cache/apt
          key: apt-cache-${{ runner.os }}-${{ hashFiles('**/make_libreoffice_appimage') }}
          restore-keys: apt-cache-${{ runner.os }}-

      - name: Download appimagetool
        run: |
          URL="https://github.com/AppImage/appimagetool/releases/download/continuous/${APPIMAGETOOL_NAME}"
          wget --tries=5 --waitretry=3 -c "$URL" -O "$APPIMAGETOOL_NAME"
          chmod +x "$APPIMAGETOOL_NAME"

      - name: Upload appimagetool artifact
        uses: actions/upload-artifact@v7
        with:
          name: appimagetool
          path: ${{ env.APPIMAGETOOL_NAME }}

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        language: [
          en-GB, it, standard, full
        ]
        variant: [N, Y]

    steps:
      - uses: actions/checkout@v6

      - name: Download shared appimagetool
        uses: actions/download-artifact@v8
        with:
          name: appimagetool
          path: .

      - name: Restore apt cache
        uses: actions/cache@v5
        with:
          path: $HOME/.cache/apt
          key: apt-cache-${{ runner.os }}-${{ hashFiles('**/make_libreoffice_appimage') }}
          restore-keys: apt-cache-${{ runner.os }}-

      - name: Minimal system setup
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends desktop-file-utils
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Build AppImage
        run: |
          chmod +x ./make_libreoffice_appimage
          chmod +x ./${APPIMAGETOOL_NAME}
          ln -sf ./${APPIMAGETOOL_NAME} ./appimagetool
          export PATH="$PWD:$PATH"
          ./make_libreoffice_appimage fresh x86-64 "${{ matrix.language }}" "${{ matrix.variant }}" Y Y Y

      - name: Upload artifact (per job)
        uses: actions/upload-artifact@v7
        with:
          name: AppImage-${{ matrix.language }}-${{ matrix.variant }}-${{ github.run_id }}
          path: "./*/*AppImage*"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Merge artifacts
        run: |
          mkdir -p dist
          find . -name "*AppImage*" -exec bash -c '
            f="{}"
            bn="$(basename "$f")"
            mv -n "$f" "dist/${{ github.run_id }}-${bn}" || echo "skipped $f"
          ' \;

      - name: get snapshot date
        id: snapshot
        run: |
          SNAPSHOT_TAG="$(date --utc +'%Y%m%d-%H%M%S')"
          echo "SNAPSHOT_TAG=$SNAPSHOT_TAG" >> "$GITHUB_ENV"

      - name: Create snapshot release
        uses: softprops/action-gh-release@v2
        with:
          name: "Snapshot FRESH $SNAPSHOT_TAG"
          tag_name: $SNAPSHOT_TAG
          files: dist/*

      - name: Continuous release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          title: LibreOffice FRESH
          automatic_release_tag: continuous-fresh
          files: dist/*
          repo_token: ${{ secrets.GITHUB_TOKEN }}
