name: LibreOffice Fresh

on:
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

concurrency:
  group: build-${{ (github.ref_name || github.ref) && (github.ref_name || github.ref) | replace('/', '-') }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  APPIMAGETOOL_NAME: appimagetool-x86_64.AppImage

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup apt cache folder
        run: |
          mkdir -p "$HOME/.cache/apt/archives"

      - name: Cache apt packages
        id: cache
        uses: actions/cache@v4
        with:
          path: $HOME/.cache/apt
          key: apt-cache-${{ runner.os }}-${{ hashFiles('**/make_libreoffice_appimage') }}
          restore-keys: apt-cache-${{ runner.os }}-

      - name: Download appimagetool
        run: |
          set -euo pipefail
          URL="https://github.com/AppImage/appimagetool/releases/download/continuous/${APPIMAGETOOL_NAME}"
          wget --tries=5 --waitretry=3 -c "$URL" -O "${APPIMAGETOOL_NAME}"
          chmod +x "${APPIMAGETOOL_NAME}"

      - name: Upload appimagetool artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimagetool
          path: ${{ env.APPIMAGETOOL_NAME }}

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [
          en-GB, it, ar, zh-CN, zh-TW,
          fr, de, ja, ko,
          pt, pt-BR, es, ru,
          standard, full
        ]
        variant: [N, Y]

    steps:
      - uses: actions/checkout@v6

      - name: Download shared appimagetool
        uses: actions/download-artifact@v4
        with:
          name: appimagetool
          path: ./appimagetool-dir

      - name: Ensure appimagetool present and executable
        run: |
          set -euo pipefail
          TOOL="./appimagetool-dir/${APPIMAGETOOL_NAME}"
          if [ ! -f "$TOOL" ]; then
            echo "ERROR: appimagetool missing at $TOOL" >&2
            ls -la ./appimagetool-dir || true
            exit 1
          fi
          chmod +x "$TOOL"
          echo "APPIMAGETOOL_PATH=$TOOL" >> $GITHUB_ENV
          echo "Added appimagetool-dir to PATH"
          echo "$PWD/appimagetool-dir" >> $GITHUB_PATH

      - name: Restore apt cache (best-effort)
        uses: actions/cache@v4
        with:
          path: $HOME/.cache/apt
          key: apt-cache-${{ runner.os }}-${{ hashFiles('**/make_libreoffice_appimage') }}
          restore-keys: apt-cache-${{ runner.os }}-

      - name: Minimal system setup
        run: |
          set -euo pipefail
          sudo apt-get update --yes || true
          sudo apt-get install -y --no-install-recommends desktop-file-utils || true
          # Only attempt sysctl changes if apparmor keys exist
          if sudo sysctl -a 2>/dev/null | grep -q apparmor; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0 || true
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          fi

      - name: Build AppImage
        run: |
          set -euo pipefail
          if [ ! -f ./make_libreoffice_appimage ]; then
            echo "ERROR: make_libreoffice_appimage script missing" >&2
            ls -la || true
            exit 2
          fi
          chmod +x ./make_libreoffice_appimage || true
          # ensure appimagetool in PATH (added earlier) or use explicit path $APPIMAGETOOL_PATH
          ./make_libreoffice_appimage fresh x86-64 "${{ matrix.language }}" "${{ matrix.variant }}" Y Y Y

      - name: Upload artifact (per job)
        uses: actions/upload-artifact@v4
        with:
          name: AppImage-${{ matrix.language }}-${{ matrix.variant }}-${{ github.run_id }}
          path: "./*/*AppImage*"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Merge artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          find . -name "*AppImage*" -print0 | while IFS= read -r -d '' f; do
            bn="$(basename "$f")"
            dest="dist/${{ github.run_id }}-${bn}"
            if [ -e "$dest" ]; then
              echo "skipping existing $dest"
            else
              mv "$f" "$dest" || echo "mv failed for $f"
            fi
          done
          ls -la dist || true

      - name: get snapshot date
        id: snapshot
        run: |
          SNAPSHOT_TAG="$(date --utc +'%Y%m%d-%H%M%S')"
          echo "SNAPSHOT_TAG=$SNAPSHOT_TAG" >> "$GITHUB_ENV"

      - name: Create snapshot release
        uses: softprops/action-gh-release@v2
        with:
          name: "Snapshot FRESH $SNAPSHOT_TAG"
          tag_name: $SNAPSHOT_TAG
          files: dist/*

      - name: Continuous release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          title: LibreOffice FRESH
          automatic_release_tag: continuous-fresh
          files: dist/*
          repo_token: ${{ secrets.GITHUB_TOKEN }}
